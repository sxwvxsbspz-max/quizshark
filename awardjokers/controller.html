<!-- --- FILE: ./awardjokers/controller.html --- -->
{% extends "templates/base.html" %}

{% block content %}
<div class="aj ajController">
  <div class="aj__wrap">

    <!-- Fixe Stack-Hülle für Shield + Name + Card -->
    <div class="aj__stack">

      <!-- Top: großer Joker-Background -->
      <div class="aj__top">
        <img
          class="aj__shield"
          src="/awardjokers/media/joker_background.svg"
          alt=""
          aria-hidden="true"
        />
      </div>

      <!-- Name -->
      <div class="aj__name" id="aj-player-name"></div>

      <!-- Bottom Card -->
      <div class="aj__card" id="aj-card" style="display:none;">

        <div class="aj__cardOverlay" id="aj-card-overlay" aria-hidden="true"></div>

        <!-- Dynamische Joker-Icons -->
        <div class="aj__jokerArea">
          <div class="aj__jokers" id="aj-jokers" aria-hidden="true"></div>
        </div>

        <div class="aj__rankBox">
          <span class="aj__rankText" id="aj-player-rank">—</span>
        </div>
      </div>

    </div>
    <!-- /aj__stack -->

  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/awardjokers/static/controller.css">

<script>
  // =====================================================
  // Controller ist reine Anzeige (empfängt nur)
  // =====================================================

  function getSelfPlayerId(){
    return (
      localStorage.getItem('blitzquiz_player_id') ||
      localStorage.getItem('player_id') ||
      localStorage.getItem('playerId') ||
      sessionStorage.getItem('blitzquiz_player_id') ||
      sessionStorage.getItem('player_id') ||
      sessionStorage.getItem('playerId') ||
      null
    );
  }

  function getSelfRunId(){
    return (
      localStorage.getItem('blitzquiz_run_id') ||
      sessionStorage.getItem('blitzquiz_run_id') ||
      null
    );
  }

  function registerController(){
    socket.emit('register_controller', {
      player_id: getSelfPlayerId() || "",
      run_id: getSelfRunId() || ""
    });
  }

  registerController();
  socket.on('connect', () => registerController());

  const nameEl    = document.getElementById('aj-player-name');
  const cardEl    = document.getElementById('aj-card');
  const scoreEl   = document.getElementById('aj-player-rank');
  const jokersEl  = document.getElementById('aj-jokers');
  const overlayEl = document.getElementById('aj-card-overlay');

  // State (für Phasen-basiertes Unveil)
  let lastBoard = null;        // players_ranked cache (für reveal events)
  let lastPack  = null;        // zuletzt empfangener pack (für Reihenfolge/Replay)
  let disconnectedTimer = null;

  function clampJokers(n){
    const x = Number(n || 0) || 0;
    return Math.max(0, Math.min(2, x));
  }

  // Liefert 1–2 Icons, bei 0 → nojoker.svg
  function computeJokerIcons(jokersWhite, jokersGold){
    const w = clampJokers(jokersWhite);
    const g = clampJokers(jokersGold);
    const total = Math.min(2, w + g);

    const GOLD  = "/awardjokers/media/joker_gold.svg";
    const WHITE = "/awardjokers/media/joker_white.svg";
    const NO    = "/awardjokers/media/nojoker.svg";

    if (total === 0) return [NO];
    if (total === 1) return (g === 1) ? [GOLD] : [WHITE];

    if (g === 2) return [GOLD, GOLD];
    if (w === 2) return [WHITE, WHITE];

    return [WHITE, GOLD]; // 1 white + 1 gold
  }

  function renderJokers(iconSrcList){
    if (!jokersEl) return;
    const icons = Array.isArray(iconSrcList) ? iconSrcList : [];
    jokersEl.innerHTML = icons.map(src =>
      `<img class="aj__jokerIcon" src="${src}" alt="">`
    ).join("");
  }

  function triggerUnveil(){
    if (!cardEl) return;
    cardEl.classList.add('is-unveiled');
  }

  function showOverlay(){
    if (!cardEl) return;
    cardEl.classList.remove('is-unveiled');
  }

  function renderDisconnected(){
    lastBoard = null;
    lastPack = null;

    if (nameEl) nameEl.textContent = '';
    if (scoreEl) scoreEl.textContent = '—';
    if (cardEl) cardEl.style.display = 'none';
    if (jokersEl) jokersEl.innerHTML = '';

    if (disconnectedTimer) {
      clearTimeout(disconnectedTimer);
      disconnectedTimer = null;
    }
  }

  function computePackForMe(me){
    const w = clampJokers(me && me.jokers_white);
    const g = clampJokers(me && me.jokers_gold);

    if (w === 0 && g === 0) return 'nojoker';
    if (w === 1 && g === 0) return 'white1';
    if (w === 2 && g === 0) return 'white2';
    if (w === 1 && g === 1) return 'mixed';
    if (w === 0 && g === 2) return 'gold2';

    // Fallback
    return 'nojoker';
  }

  function shouldUnveilForPack(me, pack){
    const p = String(pack || '').trim();
    const myPack = computePackForMe(me);
    return p && (p === myPack);
  }

  function getMeFromBoard(playersRanked){
    const selfId = getSelfPlayerId();
    const list = Array.isArray(playersRanked) ? playersRanked : [];
    if (!selfId) return null;
    return list.find(p => String(p.player_id) === String(selfId)) || null;
  }

  function renderSelfOnly(playersRanked){
    const me = getMeFromBoard(playersRanked);

    if (!me) {
      renderDisconnected();
      return;
    }

    const name  = (me.name || '').trim() || 'Unbekannt';
    const score = Number(me.score || 0) || 0;
    const icons = computeJokerIcons(me.jokers_white, me.jokers_gold);

    if (nameEl)  nameEl.textContent = name;
    if (scoreEl) scoreEl.textContent = score;

    renderJokers(icons);

    if (cardEl) cardEl.style.display = 'flex';

    // Standard: Overlay bleibt drauf, bis Reveal-Phase passt
    showOverlay();
  }

  function applyRevealIfPossible(){
    if (!lastBoard || !lastPack) return;

    const me = getMeFromBoard(lastBoard);
    if (!me) return;

    // Wenn Pack zu mir passt -> unveil
    if (shouldUnveilForPack(me, lastPack)) {
      triggerUnveil();
    }
  }

  // --------------------------------------------------
  // Grace-Period
  // --------------------------------------------------
  disconnectedTimer = setTimeout(() => {
    renderDisconnected();
    disconnectedTimer = null;
  }, 1000);

  socket.on('show_awardjokers', (data) => {
    if (!data || !Array.isArray(data.players_ranked)) return;

    if (disconnectedTimer) {
      clearTimeout(disconnectedTimer);
      disconnectedTimer = null;
    }

    lastBoard = data.players_ranked;

    renderSelfOnly(data.players_ranked);

    // Falls Pack schon vorher kam (Reihenfolge/Replay), direkt anwenden
    applyRevealIfPossible();
  });

// NEU: Reveal-Phasen aus Backend (kein Timeout mehr)
socket.on('awardjokers_reveal', (data) => {
  data = data || {};

  // NEU: "pre"-Events vom TV ignorieren (sonst unveil zu früh)
  if (data.pre) return;

  lastPack = (data.pack || '').trim();

  // Falls Board schon da ist -> sofort anwenden
  applyRevealIfPossible();
});



  socket.on('game_finished', () => {
    window.location.href = '/play';
  });

  renderDisconnected();
</script>
{% endblock %}
