<!-- --- FILE: ./admin/admin.html --- -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BlitzQuiz – Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111;
            color: #fff;
        }
        .wrap {
            max-width: 560px;
            margin: 64px auto;
            padding: 0 16px;
        }
        h1 {
            margin: 0 0 28px 0;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
        }

        .card {
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .card h2 {
            margin: 0 0 14px 0;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-size: 1.05rem;
            flex-wrap: wrap;
        }

        .label {
            opacity: 0.9;
            font-weight: 700;
        }

        input[type="checkbox"] {
            width: 56px;
            height: 28px;
            appearance: none;
            background: #444;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            outline: none;
            border: 1px solid #555;
        }
        input[type="checkbox"]::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }
        input[type="checkbox"]:checked::after {
            transform: translateX(28px);
        }

        #phaseToggle:checked { background: #3498db; border-color: #3a8fc6; }
        #goToggle:checked { background: #f39c12; border-color: #d8890f; }
        #pauseToggle:checked { background: #2ecc71; border-color: #28b866; }
        #postGameToggle:checked { background: #9b59b6; border-color: #864aa0; }

        .status {
            margin-top: 10px;
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .hint {
            margin-top: 10px;
            opacity: 0.7;
            font-size: 0.9rem;
            line-height: 1.35;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid #2a2a2a;
            background: #141414;
            font-weight: 800;
            font-size: 0.95rem;
            opacity: 0.95;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #888;
        }
        .dot.is-on  { background: #2ecc71; }
        .dot.is-off { background: #e74c3c; }

        .btn {
            appearance: none;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #fff;
            border-radius: 12px;
            padding: 14px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: #202020; }
        .btn:active { transform: translateY(1px); }

        .btnDanger {
            border-color: #3b1f1f;
            background: #231010;
        }
        .btnDanger:hover { background: #2b1414; }

        .btnRow {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* ----------------------------
           PLAYER LIST (ADMIN)
           ---------------------------- */
        .playerList {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .playerRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.85rem;
        }
        .playerName {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .playerActions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .readyBtn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .readyBtn.is-ready { background: #2ecc71; }
        .readyBtn.is-not-ready { background: #e74c3c; }

        .removeBtn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="wrap">
    <h1>Admin</h1>

    <!-- OVERVIEW -->
    <div class="card">
        <h2>Status</h2>
        <div class="row">
            <div class="pill">
                <span id="runDot" class="dot is-off"></span>
                <span id="runText">Idle</span>
            </div>
            <div class="pill">
                <span>Ready:</span>
                <span id="readyCount">0/0</span>
            </div>
        </div>
        <div class="status" id="phaseReadout">Phase: —</div>
        <div class="hint">Diese Seite synced ihren Zustand vom Server.</div>
    </div>

    <!-- PHASE CONTROL -->
    <div class="card">
        <h2>Phase</h2>
        <div class="toggle">
            <span class="label">Pre-Lobby</span>
            <input id="phaseToggle" type="checkbox">
            <span class="label">Lobby</span>
        </div>
        <div class="status" id="phaseStatusText">Aktuell: —</div>
    </div>

    <!-- GO CONTROL -->
    <div class="card">
        <h2>Start-Freigabe</h2>
        <div class="toggle">
            <span class="label">Not Go</span>
            <input id="goToggle" type="checkbox">
            <span class="label">Go</span>
        </div>
        <div class="status" id="goStatusText">Go ist —</div>
    </div>

    <!-- POST GAME RETURN -->
    <div class="card">
        <h2>Nach Spielende</h2>
        <div class="toggle">
            <span class="label">Lobby</span>
            <input id="postGameToggle" type="checkbox">
            <span class="label">Pre-Lobby</span>
        </div>
        <div class="status" id="postGameStatusText">Return: —</div>
    </div>

    <!-- ABORT -->
    <div class="card">
        <h2>Abbruch</h2>
        <div class="btnRow">
            <button id="abortToLobbyBtn" class="btn btnDanger">SPIEL ABBRECHEN → Lobby</button>
            <button id="abortToPreLobbyBtn" class="btn btnDanger">SPIEL ABBRECHEN → Pre-Lobby</button>
        </div>
    </div>

    <!-- PAUSE CONTROL -->
    <div class="card">
        <h2>Sofortpause</h2>
        <div class="toggle">
            <span class="label">Aus</span>
            <input id="pauseToggle" type="checkbox">
            <span class="label">An</span>
        </div>
        <div class="status" id="pauseStatusText">Pause ist aus</div>
    </div>

    <!-- PLAYER LIST -->
    <div class="card">
        <h2>Spieler</h2>
        <div id="playerList" class="playerList"></div>
    </div>
</div>

<script>
    const socket = io();

    const runDot = document.getElementById("runDot");
    const runText = document.getElementById("runText");
    const readyCount = document.getElementById("readyCount");
    const phaseReadout = document.getElementById("phaseReadout");

    const phaseToggle = document.getElementById("phaseToggle");
    const phaseStatusText = document.getElementById("phaseStatusText");

    const goToggle = document.getElementById("goToggle");
    const goStatusText = document.getElementById("goStatusText");

    const postGameToggle = document.getElementById("postGameToggle");
    const postGameStatusText = document.getElementById("postGameStatusText");

    const abortToLobbyBtn = document.getElementById("abortToLobbyBtn");
    const abortToPreLobbyBtn = document.getElementById("abortToPreLobbyBtn");

    const pauseToggle = document.getElementById("pauseToggle");
    const pauseStatusText = document.getElementById("pauseStatusText");

    const playerListEl = document.getElementById("playerList");

    let isApplyingServerState = false;

    function setDot(on){
        runDot.classList.toggle("is-on", on);
        runDot.classList.toggle("is-off", !on);
        runText.textContent = on ? "Running" : "Idle";
    }

    function renderPlayers(players){
        playerListEl.innerHTML = "";
        (players || []).forEach(p => {
            const row = document.createElement("div");
            row.className = "playerRow";

            const name = document.createElement("div");
            name.className = "playerName";
            name.textContent = p.name || "—";

            const actions = document.createElement("div");
            actions.className = "playerActions";

            const readyBtn = document.createElement("button");
            readyBtn.className = "readyBtn " + (p.ready ? "is-ready" : "is-not-ready");
            readyBtn.onclick = () => {
                socket.emit("module_event", {
                    scope: "system",
                    action: "admin_toggle_ready",
                    payload: { player_id: p.player_id }
                });
            };

            const removeBtn = document.createElement("button");
            removeBtn.className = "removeBtn";
            removeBtn.textContent = "×";
            removeBtn.onclick = () => {
                if (!confirm(`Spieler "${p.name}" wirklich entfernen?`)) return;
                socket.emit("module_event", {
                    scope: "system",
                    action: "admin_remove_player",
                    payload: { player_id: p.player_id }
                });
            };

            actions.appendChild(readyBtn);
            actions.appendChild(removeBtn);

            row.appendChild(name);
            row.appendChild(actions);
            playerListEl.appendChild(row);
        });
    }

    function applyAdminState(st){
        isApplyingServerState = true;

        const phase = st?.current_phase || "";
        const running = !!st?.module_running;

        setDot(running);
        readyCount.textContent = `${st.ready_total}/${st.players_total}`;
        phaseReadout.textContent = `Phase: ${phase || "—"}`;

        phaseToggle.checked = (phase === "lobby");
        phaseStatusText.textContent = `Aktuell: ${phase === "lobby" ? "Lobby" : "Pre-Lobby"}`;

        goToggle.checked = !!st.admin_go;
        goStatusText.textContent = st.admin_go ? "Go ist an" : "Go ist aus";

        postGameToggle.checked = (st.post_game_phase === "pre_lobby");
        postGameStatusText.textContent = `Return: ${st.post_game_phase === "pre_lobby" ? "Pre-Lobby" : "Lobby"}`;

        phaseToggle.disabled = running;
        goToggle.disabled = running;

        renderPlayers(st.players || []);

        isApplyingServerState = false;
    }

    socket.on("connect", () => {
        socket.emit("register_admin");
        socket.emit("module_event", { scope: "system", action: "admin_state_request", payload: {} });
    });

    socket.on("admin_state", applyAdminState);

    phaseToggle.onchange = () => {
        if (isApplyingServerState) return;
        socket.emit("module_event", {
            scope: "system",
            action: "admin_set_phase",
            payload: { phase: phaseToggle.checked ? "lobby" : "pre_lobby" }
        });
    };

    goToggle.onchange = () => {
        if (isApplyingServerState) return;
        socket.emit("module_event", {
            scope: "system",
            action: goToggle.checked ? "admin_go_on" : "admin_go_off",
            payload: {}
        });
    };

    postGameToggle.onchange = () => {
        if (isApplyingServerState) return;
        socket.emit("module_event", {
            scope: "system",
            action: "admin_set_post_game_phase",
            payload: { phase: postGameToggle.checked ? "pre_lobby" : "lobby" }
        });
    };

    abortToLobbyBtn.onclick = () => {
        if (!confirm("Spiel wirklich abbrechen und zur Lobby zurückkehren?")) return;
        socket.emit("module_event", {
            scope: "system",
            action: "admin_abort",
            payload: { phase: "lobby" }
        });
    };

    abortToPreLobbyBtn.onclick = () => {
        if (!confirm("Spiel wirklich abbrechen und zur Pre-Lobby zurückkehren?")) return;
        socket.emit("module_event", {
            scope: "system",
            action: "admin_abort",
            payload: { phase: "pre_lobby" }
        });
    };

    pauseToggle.onchange = () => {
        if (pauseToggle.checked) {
            socket.emit("module_event", { scope: "system", action: "request_pause", payload: {} });
            pauseStatusText.textContent = "Pause ist angefordert";
        } else {
            socket.emit("module_event", { scope: "system", action: "resume_pause", payload: {} });
            pauseStatusText.textContent = "Pause ist aus";
        }
    };
</script>

</body>
</html>
