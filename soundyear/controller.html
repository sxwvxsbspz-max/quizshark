<!-- --- FILE: ./soundyear/controller.html --- -->
{% extends "templates/base.html" %}

{% block content %}

<div class="ps-controller">

  <!-- TITLE SCREEN -->
  <div
    id="title-screen"
    class="screen"
    style="
      background-image: url('/soundyear/media/controllerbackground.svg');
      background-size: cover;
      background-position: center;
    "
  >
    <div class="sr-title-wordmark">
      <img class="sr-title-logo" src="/soundyear/media/roundlogo.svg" alt="" aria-hidden="true">
<div class="sr-title-speedy"><span class="kern-p">W</span>elches</div>
<div class="sr-title-brain"><span class="kern-r">J</span>ahr?</div>

    </div>
  </div>

  <!-- ROUND SCREEN -->
  <div id="round-screen" class="screen screen--round" style="display:none;">
    <div class="round-label" id="round-label">Frage 1</div>
  </div>

  <!-- QUESTION / ANSWERS SCREEN -->
  <div id="qa-screen" class="screen screen--qa" style="display:none;">

    <div class="qa-inner">

      <!-- META-BOX (Name + Punktestand) -->
       <div class="psc__metaBox">
        <div class="psc__playerMeta">

          <!-- Name links -->
          <div class="psc__metaName" id="player-name">—</div>

          <!-- Score rechts -->
          <div class="psc__metaRow">
            <div class="psc__metaValue" id="player-score">
              <span class="psc__scorePopInline" style="display:none;">+0</span>
              <span class="psc__scoreValue">—</span>
            </div>
          </div>

        </div>
      </div>


      <!-- Timer-Bar (läuft während open_answers) -->
      <div class="psc__timebar" aria-hidden="true">
        <div class="psc__timebarFill" id="timebar-fill"></div>
      </div>


      <!-- FRAGE -->
      <div class="psc__questionBlock">
        <div class="question" id="question-text">
          Lade Frage …
        </div>
      </div>

      <!-- OPTIONAL IMAGE -->
      <div id="question-image-wrap" class="question-image-wrap is-hidden">
        <img
          id="question-image"
          class="question-image"
          src="/soundyear/media/dummy.png"
          alt=""
        >
      </div>

     <!-- YEAR WHEEL (CUSTOM) -->
<form id="year-form" class="syc__form" autocomplete="off" novalidate>
  <div class="syc__inputWrap">

   <div
  id="year-wheel"
  class="syc__wheel is-locked"
  tabindex="0"
  role="listbox"
  aria-label="Jahr auswählen"
  aria-disabled="true"
>
  <div class="syc__wheelFade syc__wheelFade--top" aria-hidden="true"></div>
  <div class="syc__wheelFade syc__wheelFade--bottom" aria-hidden="true"></div>
  <div class="syc__wheelWindow" aria-hidden="true"></div>

  <div id="year-wheel-scroll" class="syc__wheelScroll">
    <div id="year-wheel-list" class="syc__wheelList"></div>
  </div>
</div>


    <button
      id="year-submit"
      class="syc__submit is-locked"
      type="submit"
    >
      OK
    </button>
  </div>

  <div id="year-hint" class="syc__hint is-hidden" aria-hidden="true">
    Bitte ein Jahr auswählen.
  </div>
</form>



    </div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/soundyear/static/controller.css">
<script src="/soundyear/static/controller.js"></script>
{% endblock %}
