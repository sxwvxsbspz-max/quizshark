{# --- FILE: ./haveiever/tv.html --- #}

{% extends "templates/base.html" %}

{% block content %}

<div class="ps">

  <!-- FULLSCREEN Video Layer -->
  <div id="video-layer" class="ps__videoLayer">
    <video id="phase-video" autoplay class="ps__video">
      <source src="/haveiever/media/intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Game Layer -->
  <div id="game-layer" class="ps__gameLayer" style="display:none;">

    <div class="ps__wrap">

      <!-- LEFT: Big Panel -->
      <div class="ps__panel">
        <div class="ps__panelInner">

<!-- Top Row: Question + Votes + Timer -->
<div class="ps__topRow">
  <div class="ps__questionWrap">
    <div id="question-text" class="ps__question">Lädt Frage...</div>
  </div>

  <!-- Votes-Kachel (nur im MC sichtbar per JS) -->
  <div id="poll-meta" class="ps__pollMeta is-hidden" aria-hidden="true">
    <div id="votes-cast" class="ps__votesCast"></div>
  </div>

  <!-- Timer (soft hidden statt display:none) -->
  <div class="ps__timer is-invisible" aria-hidden="true"></div>
</div>


          <!-- FIXED IMAGE SLOT -->
          <div id="question-image-wrap" class="ps__questionImageWrap is-hidden" aria-hidden="true">
            <img
              id="question-image"
              class="ps__questionImg"
              src="/haveiever/media/dummy.svg"
              alt=""
            >
          </div>

          <!-- Answers -->
          <div class="ps__midRow">

            <!-- Answers -->
            <div id="options-grid" class="ps__answers is-invisible">
              <!-- Antworten per JS -->
            </div>

          </div>

          <!-- BOTTOM SLOT: Dummy INSIDE box when no image -->
          <div id="dummy-inbox-wrap" class="ps__dummyInBoxWrap is-hidden" aria-hidden="true">
            <img
              id="dummy-inbox-img"
              class="ps__dummyInBoxImg"
              src="/haveiever/media/dummy.svg"
              alt=""
            >
          </div>

        </div>
      </div>

      <!-- RIGHT: (Wager +) Player list -->
      <div class="ps__sidebar">

        <!-- (Optional) Placeholder wie in VollerEinsatz, bleibt leer in HaveIEver -->
        <div id="wager-column" class="ps__wagerColumn" aria-hidden="true">
          <!-- leer -->
        </div>

        <!-- Player list -->
        <div id="player-sidebar" class="ps__players">
          <!-- Spieler per JS -->
        </div>

      </div>

    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/haveiever/static/tv.css">
<script src="/haveiever/static/tv.js"></script>
{% endblock %}
