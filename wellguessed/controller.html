{% extends "templates/base.html" %}

{% block content %}

<div class="ps-controller">

  <!-- TITLE SCREEN -->
  <div
    id="title-screen"
    class="screen"
    style="
      background-image: url('/wellguessed/media/controllerbackground.svg');
      background-size: cover;
      background-position: center;
    "
  >
    <div class="sr-title-wordmark">
      <img class="sr-title-logo" src="/wellguessed/media/roundlogo.svg" alt="" aria-hidden="true">
      <div class="sr-title-speedy"><span class="kern-p">G</span>ut</div>
      <div class="sr-title-brain"><span class="kern-r">G</span>eschätzt</div>
    </div>
  </div>

  <!-- ROUND SCREEN -->
  <div id="round-screen" class="screen screen--round" style="display:none;">
    <div class="round-label" id="round-label">Frage 1</div>
  </div>

  <!-- QUESTION / ANSWERS SCREEN -->
  <div id="qa-screen" class="screen screen--qa" style="display:none;">

    <div class="qa-inner">

      <!-- META-BOX (Name + Punktestand) -->
      <div class="psc__metaBox">
        <div class="psc__playerMeta">

          <div class="psc__metaName" id="player-name">—</div>

          <div class="psc__metaRow">
            <div class="psc__metaValue" id="player-score">
              <span class="psc__scorePopInline" style="display:none;">+0</span>
              <span class="psc__scoreValue">—</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Timer-Bar -->
      <div class="psc__timebar" aria-hidden="true">
        <div class="psc__timebarFill" id="timebar-fill"></div>
      </div>

      <!-- FRAGE -->
      <div class="psc__questionBlock">
        <div class="question" id="question-text">
          Lade Frage …
        </div>
      </div>

      <!-- OPTIONAL IMAGE -->
      <div id="question-image-wrap" class="question-image-wrap is-hidden">
        <img
          id="question-image"
          class="question-image"
          src=""
          alt=""
        >
      </div>

      <!-- ZAHLEN-EINGABE -->
      <form id="answer-form" class="syc__form" autocomplete="off" novalidate>
        <div class="syc__inputWrap">
          <input
            id="answer-input"
            class="syc__input is-locked"
            type="text"
            inputmode="decimal"
            maxlength="20"
            placeholder="Zahl schätzen …"
            aria-label="Zahl schätzen"
          >
          <button
            id="answer-submit"
            class="syc__submit is-locked"
            type="submit"
          >
            OK
          </button>
        </div>

        <div id="answer-hint" class="syc__hint is-hidden" aria-hidden="true">
          Bitte eine Zahl eingeben.
        </div>
      </form>

    </div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/wellguessed/static/controller.css">
<script src="/wellguessed/static/controller.js"></script>
{% endblock %}
