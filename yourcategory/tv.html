{% extends "templates/base.html" %}

{% block content %}
<div class="yc-tv">

  <!-- ================================================================
       LAYER 0: VIDEO (Intro + Fragenvideos wie Punktesammler)
       ================================================================ -->
  <div id="yc-video-layer" class="yc-tv__layer" style="background:#000;">
    <video id="yc-phase-video" autoplay class="yc-video">
      <source src="/yourcategory/media/intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ================================================================
       LAYER 1: CATEGORY INPUT
       ================================================================ -->
  <div id="yc-input-layer" class="yc-tv__layer ps yc-input-phase" style="display:none;">
    <div class="ps__wrap">

      <!-- LEFT: Big Panel -->
      <div class="ps__panel">
        <div class="ps__panelInner">

          <div class="ps__topRow">
            <div class="ps__questionWrap">
              <div class="ps__question">Wählt jetzt eure Wunschkategorie</div>
            </div>
            <div class="ps__timer" id="input-timer-circle" aria-hidden="true"></div>
          </div>

          <div class="ps__midRow">
            <div id="input-inspiration-stage" class="yc-insp-stage">
              <!-- populated by JS -->
            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT: Player list -->
      <div class="ps__sidebar">
        <div id="input-player-sidebar" class="ps__players"></div>
      </div>

    </div>
  </div>

  <!-- ================================================================
       LAYER 2: GENERATING / LOADING
       ================================================================ -->
  <div id="yc-generating-layer" class="yc-tv__layer ps yc-input-phase" style="display:none;">
    <div class="ps__wrap">

      <!-- LEFT: Panel with generation info -->
      <div class="ps__panel">
        <div class="ps__panelInner">

          <div class="ps__topRow">
            <div class="ps__questionWrap">
              <div class="ps__question">KI generiert Fragen …</div>
            </div>
          </div>

          <div class="ps__midRow">
            <div class="yc-gen__content">
              <div class="yc-gen__progress" id="gen-progress-text">0 von 0 fertig</div>
              <div class="yc-gen__barWrap" aria-hidden="true">
                <div class="yc-gen__barFill" id="gen-bar-fill"></div>
              </div>
              <svg class="yc-gen__net" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                  <filter id="yc-glow" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur stdDeviation="2.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                  <path id="yc-p1"  d="M50,65  L160,35"/>
                  <path id="yc-p2"  d="M50,65  L160,100"/>
                  <path id="yc-p3"  d="M50,65  L160,165"/>
                  <path id="yc-p4"  d="M50,135 L160,35"/>
                  <path id="yc-p5"  d="M50,135 L160,100"/>
                  <path id="yc-p6"  d="M50,135 L160,165"/>
                  <path id="yc-p7"  d="M160,35  L270,75"/>
                  <path id="yc-p8"  d="M160,35  L270,125"/>
                  <path id="yc-p9"  d="M160,100 L270,75"/>
                  <path id="yc-p10" d="M160,100 L270,125"/>
                  <path id="yc-p11" d="M160,165 L270,75"/>
                  <path id="yc-p12" d="M160,165 L270,125"/>
                </defs>
                <g stroke="rgba(255,255,255,0.18)" stroke-width="1.2" fill="none">
                  <line x1="50"  y1="65"  x2="160" y2="35"/>
                  <line x1="50"  y1="65"  x2="160" y2="100"/>
                  <line x1="50"  y1="65"  x2="160" y2="165"/>
                  <line x1="50"  y1="135" x2="160" y2="35"/>
                  <line x1="50"  y1="135" x2="160" y2="100"/>
                  <line x1="50"  y1="135" x2="160" y2="165"/>
                  <line x1="160" y1="35"  x2="270" y2="75"/>
                  <line x1="160" y1="35"  x2="270" y2="125"/>
                  <line x1="160" y1="100" x2="270" y2="75"/>
                  <line x1="160" y1="100" x2="270" y2="125"/>
                  <line x1="160" y1="165" x2="270" y2="75"/>
                  <line x1="160" y1="165" x2="270" y2="125"/>
                </g>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.0s"><mpath href="#yc-p1"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.3s"><mpath href="#yc-p2"/></animateMotion></circle>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.3s" repeatCount="indefinite" begin="0.7s"><mpath href="#yc-p3"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.5s" repeatCount="indefinite" begin="0.2s"><mpath href="#yc-p4"/></animateMotion></circle>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.9s"><mpath href="#yc-p5"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.5s"><mpath href="#yc-p6"/></animateMotion></circle>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.3s" repeatCount="indefinite" begin="0.1s"><mpath href="#yc-p7"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.5s" repeatCount="indefinite" begin="0.6s"><mpath href="#yc-p8"/></animateMotion></circle>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.4s"><mpath href="#yc-p9"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#yc-p10"/></animateMotion></circle>
                <circle r="4.5" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.3s" repeatCount="indefinite" begin="0.2s"><mpath href="#yc-p11"/></animateMotion></circle>
                <circle r="4.0" fill="white" filter="url(#yc-glow)"><animateMotion dur="1.5s" repeatCount="indefinite" begin="0.6s"><mpath href="#yc-p12"/></animateMotion></circle>
                <g fill="white" filter="url(#yc-glow)">
                  <circle class="yc-gen__node yc-gen__node--d0" cx="50"  cy="65"  r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d1" cx="50"  cy="135" r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d2" cx="160" cy="35"  r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d3" cx="160" cy="100" r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d4" cx="160" cy="165" r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d1" cx="270" cy="75"  r="9"/>
                  <circle class="yc-gen__node yc-gen__node--d3" cx="270" cy="125" r="9"/>
                </g>
              </svg>
            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT: Player list -->
      <div class="ps__sidebar">
        <div id="gen-player-sidebar" class="ps__players"></div>
      </div>

    </div>
  </div>

  <!-- ================================================================
       LAYER 3: GAME LAYER (MC – wie Punktesammler)
       ================================================================ -->
  <div id="game-layer" class="yc-tv__layer ps" style="display:none;">

    <div class="ps__wrap">

      <!-- LEFT -->
      <div class="ps__panel">
        <div class="ps__panelInner">

          <!-- Announcement-Bar (erscheint vor jeder Frage, bleibt stehen) -->
          <div id="yc-ann-bar" class="yc-ann__bar is-hidden">
            <span class="yc-ann__bar-label">Kategorie:</span>
            <span class="yc-ann__bar-cat" id="ann-bar-category">—</span>
            <span class="yc-ann__bar-sep">von:</span>
            <span class="yc-ann__bar-player" id="ann-bar-player">—</span>
          </div>

          <div class="ps__topRow">
            <div class="ps__questionWrap">
              <div id="question-text" class="ps__question">Lädt Frage …</div>
            </div>
            <div id="game-timer" class="ps__timer is-invisible" aria-hidden="true"></div>
          </div>

          <div id="question-image-wrap" class="ps__questionImageWrap is-hidden" aria-hidden="true">
            <img id="question-image" class="ps__questionImg" src="/punktesammler/media/dummy.svg" alt="">
          </div>

          <div class="ps__midRow">
            <div id="options-grid" class="ps__answers is-invisible"></div>
          </div>

          <div id="dummy-inbox-wrap" class="ps__dummyInBoxWrap is-hidden" aria-hidden="true">
            <img id="dummy-inbox-img" class="ps__dummyInBoxImg" src="/punktesammler/media/dummy.svg" alt="">
          </div>

        </div>
      </div>

      <!-- RIGHT -->
      <div class="ps__sidebar">
        <div id="player-sidebar" class="ps__players"></div>
      </div>

    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/punktesammler/static/tv.css">
<link rel="stylesheet" href="/yourcategory/static/tv.css">
<script src="/yourcategory/static/tv.js"></script>
{% endblock %}
